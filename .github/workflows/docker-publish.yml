name: Publish Docker Image

# Builds the sds-websocket-server Docker image and pushes it to the GitHub
# Container Registry (ghcr.io) whenever websocket-server sources change on the
# main branch.  The resulting image can be pulled on any server with
# "docker compose pull" — no local build, no node-gyp, no RAM spike.
#
# The image is public by default. To change visibility:
#   GitHub → repository → Packages → sds-websocket-server → Package settings → Change visibility

on:
  push:
    branches: [main]
    paths:
      - 'packages/websocket-server/**'
      - 'packages/persistence-node/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # GHCR image name: ghcr.io/<owner>/sds-websocket-server
  IMAGE_NAME: ${{ github.repository_owner }}/sds-websocket-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        # version is read from the "packageManager" field in package.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        # build websocket-server and all its workspace dependencies
        run: pnpm --filter @rozek/sds-websocket-server... build

      - name: Pack @rozek/sds-websocket-server
        # creates rozek-sds-websocket-server-<version>.tgz in the Docker build context
        # Note: pnpm pack does not support --filter, so we cd into the package directory
        run: |
          cd packages/websocket-server
          pnpm pack --pack-destination deployment/server/
          mv deployment/server/rozek-sds-websocket-server-*.tgz \
             deployment/server/sds-websocket-server.tgz

      - name: Pack @rozek/sds-persistence-node
        # sds-persistence-node is a peer dependency loaded dynamically at runtime;
        # it must be present in the Docker build context alongside the server tarball
        run: |
          cd packages/persistence-node
          pnpm pack --pack-destination ../websocket-server/deployment/server/
          mv ../websocket-server/deployment/server/rozek-sds-persistence-node-*.tgz \
             ../websocket-server/deployment/server/sds-persistence-node.tgz

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        # required for multi-platform builds
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: packages/websocket-server/deployment/server
          push: true
          # amd64: most VPS providers; arm64: Raspberry Pi, Oracle Ampere, AWS Graviton
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # cache between runs so repeated builds are fast
          cache-from: type=gha
          cache-to: type=gha,mode=max
